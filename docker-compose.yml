services:
  auth-mysql:
    image: mysql:8.0.36
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_password
    volumes:
      - auth_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  store-mysql:
    image: mysql:8.0.36
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: store_db
      MYSQL_USER: store_user
      MYSQL_PASSWORD: store_password
    volumes:
      - store_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  ganache:
    image: trufflesuite/ganache-cli:v6.12.2
    command:
      - "--host=0.0.0.0"
      - "--port=8545"
      - "--chainId=1337"
      - "--networkId=1337"
      - "--gasPrice=1"
      - "--account=0xb64be88dd6b89facf295f4fd0dda082efcbe95a2bb4478f5ee582b7efe88cf60,1000000000000000000000"
    ports:
      - "8545:8545"
    restart: unless-stopped

  adminer:
    image: adminer:4.8.1
    ports:
      - "8080:8080"
    depends_on:
      auth-mysql:
        condition: service_healthy
      store-mysql:
        condition: service_healthy
    restart: unless-stopped

  authentication:
    build:
      context: ./authentication
    environment:
      DATABASE_URL: mysql+pymysql://auth_user:auth_password@auth-mysql:3306/auth_db
      JWT_SECRET: JWT_SECRET_DEV_KEY
      ROLES_FIELD: roles
      ROLE_OWNER: owner
      ROLE_CUSTOMER: customer
      ROLE_COURIER: courier
      ALLOW_RESET: "1"
      RESET_TOKEN: "dev"
    ports:
      - "5000:5000"
    depends_on:
      auth-mysql:
        condition: service_healthy
    restart: unless-stopped

  owner:
    build:
      context: ./store
    environment:
      DATABASE_URL: mysql+pymysql://store_user:store_password@store-mysql:3306/store_db
      JWT_SECRET: JWT_SECRET_DEV_KEY
      ROLES_FIELD: roles
      ROLE_OWNER: owner
      ROLE_CUSTOMER: customer
      ROLE_COURIER: courier
      WITH_AUTHENTICATION: "1"
      WITH_BLOCKCHAIN: "1"
      PROVIDER_URL: http://ganache:8545
      OWNER_PRIVATE_KEY: 0xb64be88dd6b89facf295f4fd0dda082efcbe95a2bb4478f5ee582b7efe88cf60
      ALLOW_RESET: "1"
      RESET_TOKEN: "dev"
      SERVICE_MODE: owner
      PORT: "5001"
    ports:
      - "5001:5001"
    depends_on:
      store-mysql:
        condition: service_healthy
      ganache:
        condition: service_started
    restart: unless-stopped

  customer:
    build:
      context: ./store
    environment:
      DATABASE_URL: mysql+pymysql://store_user:store_password@store-mysql:3306/store_db
      JWT_SECRET: JWT_SECRET_DEV_KEY
      ROLES_FIELD: roles
      ROLE_OWNER: owner
      ROLE_CUSTOMER: customer
      ROLE_COURIER: courier
      WITH_AUTHENTICATION: "1"
      WITH_BLOCKCHAIN: "1"
      PROVIDER_URL: http://ganache:8545
      OWNER_PRIVATE_KEY: 0xb64be88dd6b89facf295f4fd0dda082efcbe95a2bb4478f5ee582b7efe88cf60
      ALLOW_RESET: "1"
      RESET_TOKEN: "dev"
      SERVICE_MODE: customer
      PORT: "5002"
    ports:
      - "5002:5002"
    depends_on:
      store-mysql:
        condition: service_healthy
      ganache:
        condition: service_started
    restart: unless-stopped

  courier:
    build:
      context: ./store
    environment:
      DATABASE_URL: mysql+pymysql://store_user:store_password@store-mysql:3306/store_db
      JWT_SECRET: JWT_SECRET_DEV_KEY
      ROLES_FIELD: roles
      ROLE_OWNER: owner
      ROLE_CUSTOMER: customer
      ROLE_COURIER: courier
      WITH_AUTHENTICATION: "1"
      WITH_BLOCKCHAIN: "1"
      PROVIDER_URL: http://ganache:8545
      OWNER_PRIVATE_KEY: 0xb64be88dd6b89facf295f4fd0dda082efcbe95a2bb4478f5ee582b7efe88cf60
      ALLOW_RESET: "1"
      RESET_TOKEN: "dev"
      SERVICE_MODE: courier
      PORT: "5003"
    ports:
      - "5003:5003"
    depends_on:
      store-mysql:
        condition: service_healthy
      ganache:
        condition: service_started
    restart: unless-stopped

  stats:
    build:
      context: ./store
    environment:
      DATABASE_URL: mysql+pymysql://store_user:store_password@store-mysql:3306/store_db
      JWT_SECRET: JWT_SECRET_DEV_KEY
      ROLES_FIELD: roles
      ROLE_OWNER: owner
      ROLE_CUSTOMER: customer
      ROLE_COURIER: courier
      WITH_AUTHENTICATION: "1"
      WITH_BLOCKCHAIN: "1"
      PROVIDER_URL: http://ganache:8545
      OWNER_PRIVATE_KEY: 0xb64be88dd6b89facf295f4fd0dda082efcbe95a2bb4478f5ee582b7efe88cf60
      ALLOW_RESET: "1"
      RESET_TOKEN: "dev"
      SERVICE_MODE: stats
      PORT: "5004"
    ports:
      - "5004:5004"
    depends_on:
      store-mysql:
        condition: service_healthy
      ganache:
        condition: service_started
    restart: unless-stopped

volumes:
  auth_mysql_data:
  store_mysql_data:
