services:
  mysql:
    image: mysql:8.0.36
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  adminer:
    image: adminer:4.8.1
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  authentication:
    build:
      context: ./authentication
    environment:
      DATABASE_URL: mysql+pymysql://auth_user:auth_password@mysql:3306/auth_db
      JWT_SECRET: JWT_SECRET_DEV_KEY
      ROLES_FIELD: roles
      ROLE_OWNER: owner
      ROLE_CUSTOMER: customer
      ROLE_COURIER: courier
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:

